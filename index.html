<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XENON</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#000;
      color:white;
    }

    header{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
      background:linear-gradient(to bottom,#000,#111);
    }

    h1{
      font-size:80px;
      letter-spacing:10px;
      margin-bottom:20px;
    }

    p{
      color:#aaa;
      max-width:600px;
      line-height:1.7;
      margin-bottom:30px;
    }

    .btn{
      padding:15px 35px;
      background:white;
      color:black;
      text-decoration:none;
      border-radius:50px;
      font-weight:bold;
    }

    .hero-image{
      width:90%;
      max-width:1000px;
      margin-top:50px;
      border-radius:20px;
    }

    section{
      padding:100px 10%;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:30px;
    }

    .card{
      background:#111;
      padding:30px;
      border-radius:20px;
    }

    .card h2{
      margin-bottom:15px;
    }

    footer{
      text-align:center;
      padding:40px;
      color:#666;
    }

  </style>
</head>

<body>

<header>

  <h1>XENON</h1>

  <p>
    La nouvelle génération de chaussures barefoot futuristes.
  </p>

  <a href="#" class="btn">Découvrir</a>

  <img src="ChatGPT Image 22 mai 2026 à 18_29_06.png" class="hero-image">

</header>

<section>

  <div class="cards">

    <div class="card">
      <h2>Ultra Flexible</h2>
      <p>Mouvement naturel et confort absolu.</p>
    </div>

    <div class="card">
      <h2>Grip Maximal</h2>
      <p>Adhérence performante sur toutes surfaces.</p>
    </div>

    <div class="card">
      <h2>Design Futuriste</h2>
      <p>Inspiré du techwear et du sport haute performance.</p>
    </div>

  </div>

</section>

<footer>
  © 2026 XENON
</footer>

</body>
</html>
